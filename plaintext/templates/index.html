 <!DOCTYPE html>
<html>
<head>
    <title>Python Calc</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        form { display: inline-block; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        input, select, button { margin: 10px; padding: 10px; }
    </style>
</head>
<body>
    <h2>Simple Python Calculator</h2>
    <form method="POST">
        <input type="number" name="num1" step="any" placeholder="First Number" required>
        <select name="operation">
            <option value="add">+</option>
            <option value="subtract">-</option>
            <option value="multiply">×</option>
            <option value="divide">÷</option>
        </select>
        <input type="number" name="num2" step="any" placeholder="Second Number" required>
        <br>
        <button type="submit">Calculate</button>
    </form>
    {% if result is not none %}
        <h3>Result: {{ result }}</h3>
    {% endif %}
</body>
</html>
